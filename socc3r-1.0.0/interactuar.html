<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socc3r - Detalle de Tarjeta</title>
    <style>
        @font-face {
            font-family: 'DigiBop';
            src: url('https://dl.dropbox.com/s/8maabpvuycdrlai/DigiBop-Regular.ttf');
            font-display: swap;
        }

        :root {
            --bg-gradient: linear-gradient(45deg, #fbc2eb 0%, #a6c1ee 100%);
            --panel-blue: #c5cfff;
            --btn-pink: #ff94fa;
            --font-main: 'DigiBop', sans-serif;
        }

        body {
            margin: 0;
            font-family: var(--font-main);
            background: var(--bg-gradient);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container {
            display: flex;
            gap: 40px;
            align-items: center;
            max-width: 900px;
            width: 90%;
        }

        /* --- LADO IZQUIERDO: LA IMAGEN DE LA TARJETA --- */
        .card-view {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card-image {
            width: 320px; /* Ajusta el tamaño según tu imagen */
            height: auto;
            border-radius: 35px; /* Para que coincida con el estilo redondeado */
            box-shadow: 10px 10px 0px rgba(0,0,0,0.1);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        .card-image:hover {
            transform: scale(1.05) rotate(2deg);
            filter: brightness(1.1);
        }

        /* --- PANEL DE BOTONES INTERACTIVOS --- */
        .interaction-panel {
            background-color: var(--panel-blue);
            flex: 1;
            border-radius: 45px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .panel-title {
            color: white;
            font-size: 2rem;
            margin-bottom: 30px;
            line-height: 1.2;
            text-transform: lowercase;
        }

        .buttons-container {
            background-color: rgba(255, 255, 255, 0.4);
            padding: 25px;
            border-radius: 35px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .interact-btn {
            background-color: var(--btn-pink);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 50px;
            font-family: var(--font-main);
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.2s;
            text-transform: lowercase;
        }

        .interact-btn:hover {
            transform: translateY(-3px);
            filter: saturate(1.2);
            box-shadow: 0 5px 15px rgba(255, 148, 250, 0.4);
        }

        .back-link {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            text-decoration: none;
            font-size: 1.2rem;
        }

        @media (max-width: 768px) {
            .container { flex-direction: column; height: auto; padding: 40px 0; }
            .card-image { width: 250px; }
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-link">← volver</a>

    <div class="container">
        <div class="card-view">
            <img src="assets/img/neymar_carta.jpg" alt="Tarjeta Brasil" class="card-image">
        </div>

        <div class="interaction-panel">
            <h2 class="panel-title">botones<br>interactivos</h2>
            
            <div class="buttons-container">
                <button class="interact-btn">animar modelo</button>
                <button class="interact-btn">información</button>
                <button class="interact-btn">efecto visual</button>
            </div>
        </div>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle del Video - Socc3r</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        @font-face {
            font-family: 'DigiBop';
            src: url('https://dl.dropbox.com/s/8maabpvuycdrlai/DigiBop-Regular.ttf');
        }

        .video-detail-bg {
            background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%);
            padding: 100px 0 40px 0; /* Reducido para móvil */
            min-height: 100vh;
            font-family: 'DigiBop', sans-serif;
        }

        /* Contenedor del Video (Verde) */
        .video-player-container {
            background-color: #d8f08c;
            border: 6px solid #c5e063;
            border-radius: 30px;
            padding: 15px;
            box-shadow: 8px 8px 0px #b191ff;
            margin-bottom: 20px;
        }

        .main-video {
            width: 100%;
            border-radius: 20px;
            border: 4px solid black; 
            background-color: black;
            display: block;
        }

        /* Estilo de la caja de filtros (Amarilla) */
        .y2k-box {
            border: 6px solid #c5e063;
            border-radius: 30px;
            padding: 20px;
            text-align: center;
        }

        .box-yellow {
            background-color: #ffe75c;
            box-shadow: 6px 6px 0px #b191ff;
        }

        .y2k-title {
            font-size: 2rem;
            text-transform: lowercase;
            margin-bottom: 15px;
            color: white;
            text-shadow: 2px 2px 0px rgba(0, 0, 0, 0.1);
        }

        /* Botones de Filtros */
        .filters-grid {
            display: grid;
            grid-template-columns: 1fr 1fr; /* Dos columnas en móvil */
            gap: 10px;
        }

        .btn-filter-y2k {
            background-color: #89d4f0;
            border: none;
            border-radius: 50px;
            color: white;
            padding: 10px 5px;
            font-size: 0.9rem;
            transition: 0.3s;
            font-family: 'DigiBop', sans-serif;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-filter-y2k:hover {
            transform: scale(1.05);
            color: white;
        }

        /* Responsividad específica */
        @media (max-width: 991px) {
            .video-detail-bg {
                padding-top: 60px; /* Menos espacio arriba en móviles */
            }
            .order-mobile-1 {
                order: 1; /* El video sube */
            }
            .order-mobile-2 {
                order: 2; /* Los filtros bajan */
            }
        }

        @media (min-width: 992px) {
            .filters-grid {
                display: block; /* Vuelve a lista en escritorio */
            }
            .btn-filter-y2k {
                width: 100%;
                margin-bottom: 10px;
                font-size: 1.1rem;
            }
            .video-player-container {
                padding: 30px;
                border-width: 8px;
            }
        }
    </style>
</head>

<body>
    <main class="video-detail-bg">
        <div class="container">
            <div class="row gy-4 justify-content-center">
                
                <div class="col-12 col-lg-8 order-mobile-1">
                    <div class="video-player-container">
                        <video controls autoplay class="main-video">
                            <source src="../socc3r-1.0.0/assets/img/gallery/brasil_video.mp4" type="video/mp4">
                            Tu navegador no soporta videos.
                        </video>
                    </div>
                </div>

                <div class="col-12 col-lg-4 order-mobile-2">
                    <div class="y2k-box box-yellow">
                        <h2 class="y2k-title">filtros</h2>
                        <div class="filters-grid">
                            <button class="btn-filter-y2k">desenfoque</button>
                            <button class="btn-filter-y2k">pixeleado</button>
                            <button class="btn-filter-y2k">térmica</button>
                            <button class="btn-filter-y2k">color</button>
                        </div>
                        <hr style="border-top: 2px solid white; margin: 20px 0;">
                        <a href="galeria.html" class="btn-filter-y2k" style="background:#ff9ed2; width: 100%;">volver</a>
                    </div>
                </div>

            </div>
        </div>
    </main>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socc3r - Escaneo Real</title>
    
    <script src="https://aframe.io/releases/1.0.4/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://raw.githack.com/donmccurdy/aframe-extras/master/dist/aframe-extras.loaders.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/studio-backend/master/src/modules/marker/tools/gesture-detector.js"></script>
    <script src="https://raw.githack.com/AR-js-org/studio-backend/master/src/modules/marker/tools/gesture-handler.js"></script>

    <style>
        @font-face {
            font-family: 'DigiBop';
            src: url('https://dl.dropbox.com/s/8maabpvuycdrlai/DigiBop-Regular.ttf');
        }

        :root {
            --bg-gradient: linear-gradient(45deg, rgba(251, 194, 235, 0.8) 0%, rgba(166, 193, 238, 0.8) 100%);
            --scan-green: #d1f587;
            --font-main: 'DigiBop', sans-serif;
        }

        body {
            margin: 0;
            overflow: hidden;
            font-family: var(--font-main);
            background-color: #000; /* Fondo base para la cámara */
        }

        /* CAPA DE INTERFAZ: Esta flota sobre la cámara */
        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg-gradient); /* El degradado ahora tiene transparencia */
            pointer-events: none; /* Permite que los clicks pasen a la cámara si es necesario */
        }

        .container {
            display: flex;
            gap: 30px;
            width: 90%;
            max-width: 1000px;
            height: 500px;
            pointer-events: auto; /* Reactiva clicks dentro del cuadro */
        }

        .info-box {
            background-color: var(--scan-green);
            flex: 1;
            border-radius: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            box-shadow: 10px 10px 0px rgba(0,0,0,0.1);
        }

        .scan-box {
            background-color: var(--scan-green);
            flex: 1.5;
            border-radius: 40px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 30px;
            box-shadow: 10px 10px 0px rgba(0,0,0,0.1);
        }

        .scan-title {
            color: white;
            font-size: 2.5rem;
            margin: 0 0 20px 0;
            text-transform: uppercase;
        }

        /* EL VISOR: Aquí es donde se "recorta" el fondo para ver la cámara */
        .camera-view {
            width: 80%;
            height: 70%;
            background-color: rgba(0,0,0,0.4); /* Oscurece un poco la cámara */
            border-radius: 20px;
            position: relative;
            border: 2px dashed rgba(255,255,255,0.8);
            overflow: hidden;
        }

        /* Esquinas */
        .corner {
            position: absolute;
            width: 30px;
            height: 30px;
            border: 8px solid white;
            z-index: 20;
        }
        .top-left { top: 15px; left: 15px; border-right: none; border-bottom: none; border-radius: 10px 0 0 0; }
        .top-right { top: 15px; right: 15px; border-left: none; border-bottom: none; border-radius: 0 10px 0 0; }
        .bottom-left { bottom: 15px; left: 15px; border-right: none; border-top: none; border-radius: 0 0 0 10px; }
        .bottom-right { bottom: 15px; right: 15px; border-left: none; border-top: none; border-radius: 0 0 10px 0; }

        .back-link {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            text-decoration: none;
            z-index: 100;
            pointer-events: auto;
        }

        /* Ajuste para AR.js: forzar que el video no tape todo */
        .a-canvas {
            position: absolute !important;
            top: 0;
            left: 0;
            z-index: 1; /* Detrás de la UI */
        }

        @media (max-width: 768px) {
            .container { flex-direction: column; height: auto; padding: 20px; }
            .info-box { display: none; }
            .scan-box { width: 100%; height: 400px; }
        }
    </style>
</head>
<body>

    <div class="ui-overlay">
        <a href="perfil.html" class="back-link">← volver al perfil</a>

        <div class="container">
            <div class="info-box">
                <p style="font-size: 1.5rem;">ingresa una<br>tarjeta<br></p>
            </div>

            <div class="scan-box">
                <h1 class="scan-title">escaneo</h1>
                <div class="camera-view">
                    <div class="corner top-left"></div>
                    <div class="corner top-right"></div>
                    <div class="corner bottom-left"></div>
                    <div class="corner bottom-right"></div>
                </div>
            </div>
        </div>
    </div>

    <a-scene
        vr-mode-ui="enabled: false;"
        loading-screen="enabled: false;"
        renderer="logarithmicDepthBuffer: true;"
        arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false;"
        id="scene"
        embedded
        gesture-detector
    >
        <a-assets>
            <a-asset-item id="animated-asset" src="assets/asset.glb"></a-asset-item>
        </a-assets>

        <a-marker
            id="animated-marker"
            type="pattern"
            preset="custom"
            url="assets/marker.patt"
            raycaster="objects: .clickable"
            emitevents="true"
            cursor="fuse: false; rayOrigin: mouse;"
        >
            <a-entity
                id="bowser-model"
                scale="0.05 0.05 0.05"
                animation-mixer="loop: repeat"
                gltf-model="#animated-asset"
                class="clickable"
                gesture-handler
            ></a-entity>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>detalle de video - socc3r</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        @font-face {
            font-family: 'DigiBop';
            src: url('https://dl.dropbox.com/s/8maabpvuycdrlai/DigiBop-Regular.ttf');
        }

        .video-detail-bg {
            background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%);
            padding: 100px 0 40px 0;
            min-height: 100vh;
            font-family: 'DigiBop', sans-serif;
        }

        .video-player-container {
            background-color: #d8f08c;
            border: 6px solid #c5e063;
            border-radius: 30px;
            padding: 15px;
            box-shadow: 8px 8px 0px #b191ff;
            margin-bottom: 20px;
        }

        .main-video {
            width: 100%;
            border-radius: 20px;
            border: 4px solid black; 
            background-color: black;
            display: block;
            transition: all 0.5s ease;
        }

        /* --- DEFINICIÓN DE FILTROS --- */
        .filter-blur { filter: blur(8px); }
        
        .filter-pastel { 
            filter: brightness(1.2) saturate(0.7) sepia(0.2) hue-rotate(-10deg); 
        }

        .filter-thermal { filter: invert(100%) hue-rotate(180deg) saturate(300%); }
        .filter-color { filter: sepia(1) hue-rotate(280deg) saturate(5); }
        .filter-none { filter: none; }

        .y2k-box {
            border: 6px solid #c5e063;
            border-radius: 30px;
            padding: 20px;
            text-align: center;
        }

        .box-yellow {
            background-color: #ffe75c;
            box-shadow: 6px 6px 0px #b191ff;
        }

        .y2k-title {
            font-size: 2rem;
            text-transform: lowercase;
            margin-bottom: 15px;
            color: white;
            text-shadow: 2px 2px 0px rgba(0, 0, 0, 0.1);
        }

       
        .filters-grid {
            display: grid;
            grid-template-columns: 1fr 1fr; 
            gap: 15px;
            justify-content: center;
            align-items: center;
        }
        
        
        .grid-full-width {
            grid-column: span 2; 
            width: 100%;
        }
        
        
        @media (max-width: 576px) {
            .btn-filter-y2k {
                font-size: 0.8rem;
                padding: 12px 2px;
            }
        }

        .btn-filter-y2k {
            background-color: #89d4f0;
            border: none;
            border-radius: 50px;
            color: white;
            padding: 10px 5px;
            font-size: 0.9rem;
            transition: 0.3s;
            font-family: 'DigiBop', sans-serif;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-filter-y2k:hover {
            transform: scale(1.05);
            background-color: #72c6e6;
            color: white;
        }

        .btn-active {
            background-color: #b191ff !important;
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.2);
        }

        @media (max-width: 991px) {
            .video-detail-bg { padding-top: 60px; }
            .order-mobile-1 { order: 1; }
            .order-mobile-2 { order: 2; }
        }

        @media (min-width: 992px) {
            .filters-grid { display: block; }
            .btn-filter-y2k { width: 100%; margin-bottom: 10px; font-size: 1.1rem; }
            .video-player-container { padding: 30px; border-width: 8px; }
        }
    </style>
</head>

<body>
    <main class="video-detail-bg">
        <div class="container">
            <div class="row gy-4 justify-content-center">
                
                <div class="col-12 col-lg-8 order-mobile-1">
                    <div class="video-player-container">
                        <video id="videoElement" controls autoplay loop muted class="main-video">
                            <source src="../socc3r-1.0.0/assets/img/gallery/video18.mp4" type="video/mp4">
                            Tu navegador no soporta videos.
                        </video>
                    </div>
                </div>

                <div class="col-12 col-lg-4 order-mobile-2">
                    <div class="y2k-box box-yellow">
                        <h2 class="y2k-title">filtros</h2>
                        <div class="filters-grid">
                            <button class="btn-filter-y2k" data-filter="filter-blur">desenfoque</button>
                            <button class="btn-filter-y2k" data-filter="filter-pastel">colores pastel</button>
                            <button class="btn-filter-y2k" data-filter="filter-thermal">térmica</button>
                            <button class="btn-filter-y2k" data-filter="filter-color">color rosa</button>
                                                
                            <button class="btn-filter-y2k grid-full-width" data-filter="filter-none" style="background:#ddd; color:#555;">
                                limpiar filtros
                            </button>
                        </div>
                        <hr style="border-top: 2px solid white; margin: 20px 0;">
                        <a href="galeria.html" class="btn-filter-y2k" style="background:#ff9ed2; width: 100%;">volver</a>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const video = document.getElementById('videoElement');
            const buttons = document.querySelectorAll('.btn-filter-y2k[data-filter]');

            buttons.forEach(btn => {
                btn.addEventListener('click', () => {
                    const filterClass = btn.getAttribute('data-filter');

                    // reiniciamos clases del video
                    video.className = 'main-video'; 

                    // aplicamos la nueva clase si existe
                    if (filterClass !== 'filter-none') {
                        video.classList.add(filterClass);
                    }

                    buttons.forEach(b => b.classList.remove('btn-active'));
                    btn.classList.add('btn-active');
                });
            });
        });
    </script>
</body>
</html>

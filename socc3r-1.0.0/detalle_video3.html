<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>Detalle del Video - Socc3r</title>
    <link href="assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <link href="assets/css/main.css" rel="stylesheet">
    
    <style>
        /* IMPORTANTE: Copiamos los estilos Y2K de tu galería para que se vea igual */
        @font-face {
            font-family: 'DigiBop';
            src: url('https://dl.dropbox.com/s/8maabpvuycdrlai/DigiBop-Regular.ttf');
        }

        .video-detail-bg {
            background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%);
            padding: 150px 0 80px 0;
            min-height: 100vh;
            font-family: 'DigiBop', sans-serif;
        }

        /* Estilo de la caja de filtros (Amarilla) */
        .y2k-box {
            border: 8px solid #c5e063;
            border-radius: 40px;
            padding: 25px;
            text-align: center;
        }

        .box-yellow {
            background-color: #ffe75c;
        }

        .y2k-title {
            font-size: 2.5rem;
            text-transform: lowercase;
            margin-bottom: 20px;
            color: white;
            text-shadow: 2px 2px 0px rgba(0, 0, 0, 0.1);
        }

        /* Botones Azules (Filtros) */
        .btn-filter-y2k {
            background-color: #89d4f0;
            border: none;
            border-radius: 50px;
            color: white;
            padding: 8px 20px;
            margin-bottom: 10px;
            width: 100%;
            font-size: 1.1rem;
            transition: 0.3s;
            display: block;
            font-family: 'DigiBop', sans-serif;
            text-decoration: none;
        }

        .btn-filter-y2k:hover {
            transform: scale(1.05);
            color: white;
        }

        /* Contenedor del Video (Verde) */
        .video-player-container {
            background-color: #d8f08c;
            border: 8px solid #c5e063;
            border-radius: 40px;
            padding: 20px;
            box-shadow: 10px 10px 0px #b191ff;
        }

        .main-video {
            width: 100%;
            border-radius: 25px;
            border: 6px solid black; /* Estilo retro */
            background-color: black;
        }

        .video-description {
            margin-top: 20px;
            color: #444;
            text-align: center;
        }
    </style>
</head>

<body>
    <main class="video-detail-bg">
        <div class="container">
            <div class="row gy-4">
                
                <div class="col-lg-3">
                    <div class="y2k-box box-yellow">
                        <h2 class="y2k-title">filtros</h2>
                        <div class="filters-list">
                            <button class="btn-filter-y2k">desenfoque</button>
                            <button class="btn-filter-y2k">pixeleado</button>
                            <button class="btn-filter-y2k">cámara térmica</button>
                            <button class="btn-filter-y2k">ajuste de color</button>
                            <hr style="border-top: 2px solid white;">
                            <a href="galeria.html" class="btn-filter-y2k" style="background:#ff9ed2;">volver</a>
                        </div>
                    </div>
                </div>

                <div class="col-lg-9">
                    <div class="video-player-container">
                        <video controls autoplay class="main-video">
                            <source src="../socc3r-1.0.0/assets/img/gallery/españa_video.mp4" type="video/mp4">
                            Tu navegador no soporta videos.
                        </video>
                    </div>
                </div>

            </div>
        </div>
    </main>
</body>
</html>

<!doctype html>
<html>
    <head>
        <script src="https://aframe.io/releases/1.0.4/aframe.min.js"></script>
        <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
        <script src="https://raw.githack.com/donmccurdy/aframe-extras/master/dist/aframe-extras.loaders.min.js"></script>

        <style>
            @font-face {
                font-family: 'DigiBop';
                src: url('https://dl.dropbox.com/s/8maabpvuycdrlai/DigiBop-Regular.ttf');
            }

            :root {
                --panel-blue: #c5cfff;
                --btn-pink: #ff94fa;
                --font-main: 'DigiBop', sans-serif;
            }

            .back-link {
                position: absolute;
                top: 20px;
                left: 20px;
                color: white;
                text-decoration: none;
                font-size: 1.6rem;
                font-family: var(--font-main);
                z-index: 1000;
                display: flex;
                align-items: center;
                text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            }

            /* MENÚ MÁS PEQUEÑO Y COMPACTO */
            #interaction-menu {
                display: none; 
                position: absolute;
                bottom: 20px; /* Pegado abajo */
                left: 50%;
                transform: translateX(-50%);
                width: 240px; /* Más estrecho */
                background-color: var(--panel-blue);
                border-radius: 35px;
                padding: 15px; /* Menos espacio interno */
                text-align: center;
                box-shadow: 0 8px 20px rgba(0,0,0,0.2);
                z-index: 999;
                font-family: var(--font-main);
            }

            .panel-title {
                color: white;
                font-size: 1.1rem; /* Título más pequeño */
                margin-bottom: 10px;
                line-height: 1.1;
                text-transform: lowercase;
            }

            .inner-container {
                background-color: rgba(255, 255, 255, 0.3);
                padding: 10px;
                border-radius: 25px;
                display: flex;
                flex-direction: column;
                gap: 6px;
            }

            .interact-btn {
                background-color: var(--btn-pink);
                color: white;
                border: none;
                padding: 8px; /* Botones más finos */
                border-radius: 50px;
                font-family: var(--font-main);
                font-size: 0.85rem;
                cursor: pointer;
                text-transform: lowercase;
            }
        </style>

        <script>
            AFRAME.registerComponent('click-to-capture', {
                init: function () {
                    this.el.addEventListener('click', () => {
                        const camera = document.querySelector('#main-camera');
                        const marker = document.querySelector('#animated-marker');
                        const menu = document.querySelector('#interaction-menu');
                        
                        const clone = document.createElement('a-entity');
                        clone.setAttribute('gltf-model', this.el.getAttribute('gltf-model'));
                        clone.setAttribute('animation-mixer', '');
                        camera.appendChild(clone);

                        // --- AJUSTE DE POSICIÓN ---
                        // x:0, y:-0.2 (BAJAMOS EL MODELO), z:-1.2 (DISTANCIA)
                        clone.setAttribute('position', '0 -0.2 -1.2');
                        
                        // Si el balón se ve muy pequeño todavía, sube este valor a 0.01
                        clone.setAttribute('scale', '0.008 0.008 0.008'); 
                        
                        clone.setAttribute('animation', {
                            property: 'rotation',
                            from: '0 0 0', to: '0 360 0',
                            dur: 10000, easing: 'linear', loop: true
                        });

                        menu.style.display = 'block';
                        this.el.parentNode.removeChild(this.el);
                        marker.parentNode.removeChild(marker);
                    });
                }
            });
        </script>
    </head>

    <body style="margin: 0; overflow: hidden;">
        
        <a href="index.html" class="back-link">← volver</a>

        <div id="interaction-menu">
            <div class="inner-container">
                <button class="interact-btn">animar modelo</button>
                <button class="interact-btn">información</button>
                <button class="interact-btn">efecto visual</button>
            </div>
        </div>

        <a-scene
            embedded
            vr-mode-ui="enabled: false;"
            renderer="logarithmicDepthBuffer: true;"
            arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false;"
        >
            <a-assets>
                <a-asset-item id="animated-asset" src="assets/asset.glb"></a-asset-item>
            </a-assets>

            <a-marker
                id="animated-marker"
                type="pattern"
                preset="custom"
                url="assets/marker.patt"
                raycaster="objects: .clickable"
                emitevents="true"
                cursor="fuse: false; rayOrigin: mouse;"
            >
                <a-entity
                    id="bowser-model"
                    class="clickable"
                    scale="0.02753394049783848 0.02753394049783848 0.02753394049783848"
                    animation-mixer="loop: repeat"
                    gltf-model="#animated-asset"
                    click-to-capture
                ></a-entity>
            </a-marker>

            <a-entity id="main-camera" camera>
                <a-cursor raycaster="objects: .clickable" visible="false"></a-cursor>
            </a-entity>
        </a-scene>
    </body>
</html>

        <style>
            @font-face {
                font-family: 'DigiBop';
                src: url('https://dl.dropbox.com/s/8maabpvuycdrlai/DigiBop-Regular.ttf');
            }

            :root {
                --panel-blue: #c5cfff;
                --btn-pink: #ff94fa;
                --font-main: 'DigiBop', sans-serif;
            }

            body { margin: 0; overflow: hidden; }

            .back-link {
                position: absolute;
                top: 20px; left: 20px;
                color: white; text-decoration: none;
                font-size: 1.6rem; font-family: var(--font-main);
                z-index: 1000; text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            }

            #interaction-menu {
                display: none;
                position: absolute;
                bottom: 20px; left: 50%;
                transform: translateX(-50%);
                width: 260px; 
                background-color: var(--panel-blue);
                border-radius: 35px;
                padding: 15px; 
                text-align: center;
                box-shadow: 0 8px 20px rgba(0,0,0,0.2);
                z-index: 999;
                font-family: var(--font-main);
            }

            .inner-container {
                background-color: rgba(255, 255, 255, 0.3);
                padding: 10px; border-radius: 25px;
                display: flex; flex-direction: column; gap: 6px;
            }

            .interact-btn {
                background-color: var(--btn-pink);
                color: white; border: none;
                padding: 8px; border-radius: 50px;
                font-family: var(--font-main);
                font-size: 0.85rem; cursor: pointer;
                text-transform: lowercase;
            }

            .reset-btn {
                background-color: #ffffff;
                color: #ff94fa !important;
                margin-top: 5px;
                font-weight: bold;
            }

            .stop-btn-active {
                background-color: #ff4444 !important;
            }

            .stop-btn-inactive {
                background-color: #70ff70 !important;
                color: #333 !important;
            }

            .modal-overlay {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0, 0, 0, 0.6);
                z-index: 1500;
                display: none;
                backdrop-filter: blur(4px);
            }
            
            .info-popup {
                z-index: 2000 !important;
            }

            .scan-frame-overlay {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                z-index: 950;
                pointer-events: none;
            }

            .scan-window {
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                width: 310px;
                height: 700px;
                border: 3px solid #ff94fa;
                border-radius: 20px;
                background: transparent;
                box-shadow: 0 0 0 9999px rgb(235, 105, 255); 
            }

            .corner {
                position: absolute;
                width: 25px;
                height: 25px;
                border-color: #ff94fa;
                border-style: solid;
                border-width: 0;
            }
            .corner-tl {
                top: -3px;
                left: -3px;
                border-top-width: 4px;
                border-left-width: 4px;
            }
            .corner-tr {
                top: -3px;
                right: -3px;
                border-top-width: 4px;
                border-right-width: 4px;
            }
            .corner-bl {
                bottom: -3px;
                left: -3px;
                border-bottom-width: 4px;
                border-left-width: 4px;
            }
            .corner-br {
                bottom: -3px;
                right: -3px;
                border-bottom-width: 4px;
                border-right-width: 4px;
            }

            @media (max-width: 500px) {
                .scan-window {
                    width: 310px;
                    height: 750px;
                }
            }
        </style>

    AFRAME.registerComponent('auto-capture', {
        init: function () {
            this.timer = null;
            this.el.addEventListener('markerFound', () => {
                if (window.isAnyModelCaptured) {
                    this.el.object3D.visible = false;
                    return;
                }
                this.timer = setTimeout(() => { this.captureModel(); }, 2000);
            });
            this.el.addEventListener('markerLost', () => { clearTimeout(this.timer); });
        },

    captureModel: function () {
    if (window.isAnyModelCaptured) return;
    
    const modelEntity = this.el.querySelector('.model-entity');
    if (!modelEntity) return;

    window.isAnyModelCaptured = true;

    const assetId = modelEntity.getAttribute('data-asset-id');
    const modelSrc = modelEntity.getAttribute('gltf-model');
    const menu = document.querySelector('#interaction-menu');
    const camera = document.querySelector('#main-camera');

    const clone = document.createElement('a-entity');
    clone.setAttribute('id', 'captured-model');
    clone.setAttribute('gltf-model', modelSrc);
    clone.setAttribute('position', '0 -0.2 -2.5');
    clone.setAttribute('scale', '0.01 0.01 0.01');
    clone.setAttribute('rotation', '0 0 0');

            camera.appendChild(clone);
            menu.style.display = 'block';
            setupMenuInteractions(assetId);

            this.el.object3D.visible = false;
            this.el.sceneEl.systems.arjs.pause();
        }
    });

function setupMenuInteractions(assetId) {

    console.log("ID del modelo capturado:", assetId);

    const buttons = document.querySelectorAll('.interact-btn');
    const model = document.querySelector('#captured-model');

    const audioAnim = new Audio('sounds/sound1.mp3'); 
    audioAnim.volume = 1;

    let isMoving = false;
    let animationTimeout = null;

    function stopAllAnimations(resetStopButton = true) {
        model.removeAttribute('animation__jump');
        model.removeAttribute('animation__float');
        model.removeAttribute('animation__rotation');
        model.removeAttribute('animation__rotation_loop');
        
        if (animationTimeout) {
            clearTimeout(animationTimeout);
            animationTimeout = null;
        }
        
        isMoving = false;
        
        const stopAnimBtn = buttons[3];
        if (stopAnimBtn && resetStopButton) {
            stopAnimBtn.textContent = 'detener animación';
            stopAnimBtn.classList.remove('stop-btn-inactive');
            stopAnimBtn.classList.add('stop-btn-active');
            stopAnimBtn.style.backgroundColor = '';
            stopAnimBtn.style.color = '';
            stopAnimBtn.disabled = false;
        }
    }

    function startFullAnimation() {
        stopAllAnimations(false);
        
        model.object3D.rotation.set(0, 0, 0);
        model.setAttribute('rotation', '0 0 0');
        model.setAttribute('position', '0 -0.2 -2.5');
        
        isMoving = true;
        
        audioAnim.currentTime = 0;
        audioAnim.play().catch(e => console.log("Error:", e));
        
        createStars(model);
        
        model.setAttribute('animation__jump', {
            property: 'position',
            from: '0 -0.2 -2.5',
            to: '0 0.2 -2.5', 
            dur: 600, 
            easing: 'easeOutCubic'
        });
        
        setTimeout(() => {
            if (!isMoving) return;
            model.setAttribute('animation__rotation', {
                property: 'rotation',
                from: '0 0 0',
                to: '0 360 0', 
                dur: 1000,
                easing: 'easeOutBack'
            });
        }, 300);
        
        const startFinalPhase = () => {
            if (!isMoving) return;
            model.removeEventListener('animationcomplete__jump', startFinalPhase);
            
            model.setAttribute('animation__float', {
                property: 'position',
                from: '0 0.2 -2.5',
                to: '0 -0.2 -2.5',
                dur: 2000,
                dir: 'alternate',
                loop: true,
                easing: 'easeInOutQuad'
            });
            
            model.addEventListener('animationcomplete__rotation', () => {
                if (!isMoving) return;
                model.setAttribute('animation__rotation_loop', {
                    property: 'rotation',
                    from: '0 360 0',
                    to: '0 720 0',
                    dur: 10000,
                    easing: 'linear',
                    loop: true
                });
            }, { once: true });
        };
        
        model.addEventListener('animationcomplete__jump', startFinalPhase);
        
        const stopAnimBtn = buttons[3];
        if (stopAnimBtn) {
            stopAnimBtn.textContent = 'detener animación';
            stopAnimBtn.classList.remove('stop-btn-inactive');
            stopAnimBtn.classList.add('stop-btn-active');
            stopAnimBtn.style.backgroundColor = '';
            stopAnimBtn.style.color = '';
            stopAnimBtn.disabled = false;
        }
    }

    const toggleButtons = (isDisabled) => {
        buttons.forEach((btn, index) => {
            if (index !== 3) {
                btn.disabled = isDisabled;
                btn.style.opacity = isDisabled ? "0.5" : "1";
                btn.style.pointerEvents = isDisabled ? "none" : "auto";
            }
        });
    };

    buttons[0].onclick = () => {
        startFullAnimation();
    };

    buttons[1].onclick = () => {
        toggleButtons(true);

        const audioClick = new Audio('sounds/sound3.wav'); 
        audioClick.volume = 1;
        audioClick.play().catch(e => console.log("Error audio:", e));
        
        const oldBox = document.querySelector('.info-popup');
        if (oldBox) oldBox.remove();

        const infoText = modelInfo[assetId] || modelInfo['default'];
        const infoBox = document.createElement('div');
        
        infoBox.className = 'info-popup';
        infoBox.style = `
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: white; padding: 25px;
            border-radius: 30px; border: 5px solid #ff94fa;
            font-family: 'DigiBop', sans-serif; z-index: 2000;
            width: 70%; text-align: center;
            box-shadow: 8px 8px 0px #c5cfff;
        `;
        
        infoBox.innerHTML = `
            <p style="color: #444; margin-bottom: 20px; line-height: 1.4;">${infoText}</p>
        `;

        const closeBtn = document.createElement('button');
        closeBtn.innerText = 'cerrar';
        closeBtn.style = `
            background: #ff94fa; border: none; color: white; 
            padding: 10px 25px; border-radius: 50px;
            font-family: 'DigiBop', sans-serif; cursor: pointer;
            box-shadow: 0 4px 0 #d679d1;
        `;
        
        closeBtn.onclick = () => {
            const audioCerrar = new Audio('sounds/sound6.wav'); 
            audioCerrar.volume = 1;
            audioCerrar.play().catch(e => console.log("Error audio:", e));
            infoBox.remove();
            toggleButtons(false);
        };

        infoBox.appendChild(closeBtn);
        document.body.appendChild(infoBox);
    };

    buttons[2].onclick = () => {
        const audioEfecto = new Audio('sounds/sound4.wav');
        audioEfecto.volume = 1;
        audioEfecto.play().catch(e => console.log("Error audio:", e));
        createConfetti(model);
        createBallParticles(model);
    };

    const stopAnimBtn = buttons[3];
    
    if (stopAnimBtn) {
        stopAnimBtn.classList.add('stop-btn-active');
        
        stopAnimBtn.onclick = () => {
            if (isMoving) {
                stopAnimBtn.disabled = true;
                stopAnimBtn.style.opacity = "0.5";
                stopAnimBtn.style.pointerEvents = "none";
                
                stopAllAnimations(true);
                
                setTimeout(() => {
                    stopAnimBtn.disabled = false;
                    stopAnimBtn.style.opacity = "1";
                    stopAnimBtn.style.pointerEvents = "auto";
                }, 500);
            }
        };
    }
}


    function createStars(target) {
        const numStars = 15;
        const scene = target.sceneEl;

        for (let i = 0; i < numStars; i++) {
            const star = document.createElement('a-entity');
            
            star.setAttribute('geometry', {
                primitive: 'circle',
                radius: 0.05,
                segments: 5 
            });

            star.setAttribute('material', {
                color: '#fffb00',
                shader: 'flat',
                side: 'double'
            });

            star.setAttribute('position', '0 0 -2.5');

            const randX = (Math.random() - 0.5) * 3;
            const randY = (Math.random() - 0.5) * 3;
            const randZ = (Math.random() - 0.5) * 2 - 3;

            star.setAttribute('animation__move', {
                property: 'position',
                to: `${randX} ${randY} ${randZ}`,
                dur: 1200,
                easing: 'easeOutExpo'
            });

            star.setAttribute('animation__rotate', {
                property: 'rotation',
                to: '0 0 360',
                dur: 1000,
                loop: true,
                easing: 'linear'
            });

            star.setAttribute('animation__fade', {
                property: 'scale',
                from: '1 1 1',
                to: '0 0 0',
                dur: 1000,
                delay: 200,
                easing: 'easeInCubic'
            });

            scene.appendChild(star);

            setTimeout(() => {
                if (star.parentNode) star.parentNode.removeChild(star);
            }, 1200);
        }
    }

    function createConfetti(target) {
        const numConfetti = 100;
        const scene = target.sceneEl;
        const colors = ['#ff94fa', '#fffb00', '#00e5ff', '#ff4d4d', '#70ff70'];

        for (let i = 0; i < numConfetti; i++) {
            const confetti = document.createElement('a-entity');
            
            confetti.setAttribute('geometry', {
                primitive: 'plane',
                width: 0.04,
                height: 0.04
            });

            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            confetti.setAttribute('material', {
                color: randomColor,
                shader: 'flat',
                side: 'double'
            });

            const startX = (Math.random() - 0.5) * 4; 
            const startY = 2;
            const startZ = -2.5;
            confetti.setAttribute('position', `${startX} ${startY} ${startZ}`);

            const endY = -2;
            confetti.setAttribute('animation__move', {
                property: 'position',
                to: `${startX} ${endY} ${startZ}`,
                dur: Math.random() * 1000 + 2000,
                easing: 'linear'
            });

            confetti.setAttribute('animation__rotate', {
                property: 'rotation',
                to: `${Math.random() * 360} 360 ${Math.random() * 360}`,
                dur: 1500,
                loop: true,
                easing: 'linear'
            });

            scene.appendChild(confetti);

            setTimeout(() => {
                if (confetti.parentNode) confetti.parentNode.removeChild(confetti);
            }, 3000);
        }
    }

    function createBallParticles(target) {
    const numBalls = 35; 
    const scene = target.sceneEl;
    const ballTextureAsset = '#balon-png'; 

    for (let i = 0; i < numBalls; i++) {
        const ball = document.createElement('a-entity');
        
        ball.setAttribute('geometry', {
            primitive: 'plane',
            width: 0.18,
            height: 0.18
        });

        ball.setAttribute('material', {
            src: ballTextureAsset,
            transparent: true,
            shader: 'flat',
            side: 'double'
        });

        
        const startX = (Math.random() - 0.5) * 4; 
        const startY = 3;                        
        const startZ = -2.5;                      
        ball.setAttribute('position', `${startX} ${startY} ${startZ}`);

        const endY = -2; 

        ball.setAttribute('animation__move', {
            property: 'position',
            to: `${startX} ${endY} ${startZ}`,
            dur: Math.random() * 1000 + 2000, 
            easing: 'linear'
        });

        ball.setAttribute('animation__rotate', {
            property: 'rotation',
            to: `0 0 ${Math.random() > 0.5 ? 360 : -360}`, 
            dur: 2000,
            loop: true,
            easing: 'linear'
        });

        scene.appendChild(ball);

        setTimeout(() => {
            if (ball.parentNode) ball.parentNode.removeChild(ball);
        }, 3500); 
    }
}

    function resetScanner() {
        location.reload();
    }
</script>

    <body>
        <a href="../socc3r-1.0.0/index.html" class="back-link"> <-- volver</a>

        <!-- recuadro encuadre-->
        <div class="scan-frame-overlay" id="scanFrameOverlay">
            <div class="scan-window">

            </div>
        </div>

        <div id="interaction-menu">
            <div class="inner-container">
                <button class="interact-btn">animar modelo</button>
                <button class="interact-btn">informacion</button>
                <button class="interact-btn">efecto visual</button>
                <button class="interact-btn">detener animación</button>
                <button class="interact-btn reset-btn" onclick="resetScanner()">escanear otro modelo</button>
            </div>
        </div>

        <a-scene
            embedded
            vr-mode-ui="enabled: false;"
            renderer="antialias: false; precision: medium; logarithmicDepthBuffer: true;"
            arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix;"
        >
            <a-entity id="main-camera" camera position="0 0 0">
            </a-entity>

            <a-assets timeout="15000">
                <a-asset-item id="asset-0" src="assets/asset.glb"></a-asset-item>
                <a-asset-item id="asset-1" src="assets/asset1.glb"></a-asset-item>
                <a-asset-item id="asset-3" src="assets/asset3.glb"></a-asset-item>
                <a-asset-item id="asset-4" src="assets/asset4.glb"></a-asset-item>
                <a-asset-item id="asset-5" src="assets/asset5.glb"></a-asset-item>
                <a-asset-item id="asset-6" src="assets/asset6.glb"></a-asset-item>

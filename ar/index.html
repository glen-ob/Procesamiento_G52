<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>Socc3r - Escaneo</title>

<!-- Librerías AR.js y A-Frame -->
<script src="https://aframe.io/releases/1.0.4/aframe.min.js"></script>
<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

<style>
body {
    margin: 0;
    overflow: hidden;
    background-color: #000;
}

#camera-container {
    position: fixed;
    top: 5%;
    left: 50%;
    transform: translateX(-50%);
    width: 90%;
    max-width: 1000px;
    aspect-ratio: 4/3;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 0 20px rgba(0,0,0,0.7);
    z-index: 1;
}

a-scene {
    width: 100%;
    height: 100%;
    display: block;
}

#hole {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 300px;
    height: 300px;
    transform: translate(-50%, -50%);
    border: 4px solid #fff;
    border-radius: 20px;
    box-shadow: 0 0 20px rgba(255,255,255,0.5);
    background: transparent;
    display: none;
    pointer-events: none;
    box-sizing: border-box;
}

.back-link {
    position: fixed;
    top: 20px;
    left: 20px;
    background: #ff9ed2;
    padding: 8px 15px;
    border-radius: 15px;
    z-index: 10;
    text-decoration: none;
    color: white;
    font-weight: bold;
}
</style>
</head>
<body>

<a href="perfil.html" class="back-link">← volver</a>

<div id="camera-container">
    <a-scene
        embedded
        arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best;"
        vr-mode-ui="enabled: false;"
        gesture-detector
    >
        <a-assets>
            <a-asset-item id="animated-asset" src="assets/asset.glb"></a-asset-item>
        </a-assets>

        <a-marker type="pattern" url="assets/marker.patt" id="myMarker">
            <a-entity
                id="modelo"
                gltf-model="#animated-asset"
                scale="0.01 0.01 0.01"
                rotation="0 0 0"
                class="clickable"
                gesture-handler
                animation-mixer
                position="0 0 0"
                visible="false"  <!-- inicialmente oculto -->
            >
            </a-entity>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>
    <div id="hole"></div>
</div>

<script>
const marker = document.querySelector('#myMarker');
const model = document.querySelector('#modelo');
const recuadro = document.getElementById('hole');

marker.addEventListener('markerFound', () => {
    recuadro.style.display = 'block'; // mostrar recuadro
    model.setAttribute('visible', 'true'); // mostrar modelo
});

marker.addEventListener('markerLost', () => {
    recuadro.style.display = 'none'; // ocultar recuadro
    // NO ocultar el modelo, para que permanezca visible
});
</script>

</body>
</html>
